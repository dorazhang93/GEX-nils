[model]
activation = 'reglu'
attention_dropout = 0.2
d_ffn_factor = 1.333333333333333
d_token = 128
ffn_dropout = 0.1
initialization = 'kaiming'
n_heads = 4
n_layers = 1
prenormalization = true
residual_dropout = 0.0
mask = false
[training]
batch_size = 64
eval_batch_size = 64
lr = 0.0001
n_epochs = 500
optimizer = 'adamw'
patience = 40
weight_decay = 1e-04
pretrain_ckpt = false
